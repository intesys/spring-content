version: 2
updates:
# Spring Boot 3.x line (default/GA branch)
- package-ecosystem: maven
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  target-branch: main
  ignore:
  - dependency-name: org.docx4j:docx4j-core
    versions:
    - ">= 11.a, < 12"
  - dependency-name: org.docx4j:docx4j-export-fo
    versions:
    - ">= 11.a, < 12"
  - dependency-name: org.docx4j:docx4j-export-fo
    versions:
    - ">= 8.0.a, < 8.1"
  - dependency-name: org.docx4j:docx4j-export-fo
    versions:
    - ">= 8.1.a, < 8.2"
  - dependency-name: org.docx4j:docx4j-JAXB-ReferenceImpl
    versions:
    - ">= 11.a, < 12"
  - dependency-name: org.springframework.boot:spring-boot-dependencies
    versions:
    - 2.4.5
  - dependency-name: jakarta.persistence:jakarta.persistence-api
    versions:
      - ">=3.2.0, <3.3.0"
# Spring Boot 4.x line (kept alive alongside main as a snapshot).
# Same configuration as the main entry. NOTE: the ignore rules below are tuned
# for Boot 3 / Jakarta EE 10 and may need to diverge once this branch actually
# moves to Boot 4 / Jakarta EE 11 (e.g. the jakarta.persistence >=3.2.0 ignore).
- package-ecosystem: maven
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  target-branch: spring-boot-4
  ignore:
  - dependency-name: org.docx4j:docx4j-core
    versions:
    - ">= 11.a, < 12"
  - dependency-name: org.docx4j:docx4j-export-fo
    versions:
    - ">= 11.a, < 12"
  - dependency-name: org.docx4j:docx4j-export-fo
    versions:
    - ">= 8.0.a, < 8.1"
  - dependency-name: org.docx4j:docx4j-export-fo
    versions:
    - ">= 8.1.a, < 8.2"
  - dependency-name: org.docx4j:docx4j-JAXB-ReferenceImpl
    versions:
    - ">= 11.a, < 12"
  - dependency-name: org.springframework.boot:spring-boot-dependencies
    versions:
    - 2.4.5
  - dependency-name: jakarta.persistence:jakarta.persistence-api
    versions:
      - ">=3.2.0, <3.3.0"
