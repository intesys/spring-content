version: 2
# Dependabot reads this file from the DEFAULT branch (main) only, even for
# updates targeting other branches. Both release lines must be configured here.
updates:
# Spring Boot 4.x line (default/GA branch)
- package-ecosystem: maven
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  target-branch: main
  ignore:
  - dependency-name: org.docx4j:docx4j-core
    versions:
    - ">= 11.a, < 12"
  - dependency-name: org.docx4j:docx4j-export-fo
    versions:
    - ">= 11.a, < 12"
  - dependency-name: org.docx4j:docx4j-export-fo
    versions:
    - ">= 8.0.a, < 8.1"
  - dependency-name: org.docx4j:docx4j-export-fo
    versions:
    - ">= 8.1.a, < 8.2"
  - dependency-name: org.docx4j:docx4j-JAXB-ReferenceImpl
    versions:
    - ">= 11.a, < 12"
  - dependency-name: org.springframework.boot:spring-boot-dependencies
    versions:
    - 2.4.5
  - dependency-name: jakarta.persistence:jakarta.persistence-api
    versions:
      - ">=3.2.0, <3.3.0"
# Spring Boot 3.x line (support/spring-boot-3 branch, maintained alongside main).
# Same configuration as the main entry. NOTE: main now tracks Boot 4 / Jakarta EE
# 11 while this line stays on Boot 3 / Jakarta EE 10, so some ignore rules (e.g.
# the jakarta.persistence >=3.2.0 ignore) may need to diverge per line.
- package-ecosystem: maven
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  target-branch: support/spring-boot-3
  ignore:
  - dependency-name: org.docx4j:docx4j-core
    versions:
    - ">= 11.a, < 12"
  - dependency-name: org.docx4j:docx4j-export-fo
    versions:
    - ">= 11.a, < 12"
  - dependency-name: org.docx4j:docx4j-export-fo
    versions:
    - ">= 8.0.a, < 8.1"
  - dependency-name: org.docx4j:docx4j-export-fo
    versions:
    - ">= 8.1.a, < 8.2"
  - dependency-name: org.docx4j:docx4j-JAXB-ReferenceImpl
    versions:
    - ">= 11.a, < 12"
  - dependency-name: org.springframework.boot:spring-boot-dependencies
    versions:
    - 2.4.5
  # This line stays on Spring Boot 3.x / Spring Framework 6.x / Jakarta EE 10 —
  # never propose the Boot 4 / Framework 7 / Jakarta EE 11 generation here.
  - dependency-name: org.springframework.boot:*
    versions:
    - ">= 4.a"
  - dependency-name: org.springframework:*
    versions:
    - ">= 7.a"
  # Jakarta EE 11 API bumps (only the artifacts whose version actually changes
  # between EE 10 and EE 11 and are used here; transaction/activation are unchanged).
  - dependency-name: jakarta.persistence:jakarta.persistence-api
    versions:
    - ">= 3.2.a"
  - dependency-name: jakarta.servlet:jakarta.servlet-api
    versions:
    - ">= 6.1.a"
  # azure-spring-boot 4.x targets the Boot 4 / Spring 6+ generation — keep this
  # line on the 3.x-compatible releases.
  - dependency-name: com.azure.spring:azure-spring-boot
    versions:
    - ">= 4.a"
