name: Main Build

on:
  push:
    branches: [ main, support/spring-boot-3 ]
    tags:
    - '*'
    paths-ignore:
    - '.github/**'
    - '*.md'
  workflow_dispatch:

# Required by the official GitHub Pages deployment (actions/deploy-pages).
permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0
    # JDK 21 covers both lines: main targets Java 21 (Spring Boot 4), the
    # support/spring-boot-3 branch targets Java 17 (Spring Boot 3), and a 21
    # toolchain compiles/runs the 17 target too.
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21
        server-id: central
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD
        gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
        gpg-passphrase: MAVEN_GPG_PASSPHRASE

    - name: Build and Test
      run: |
        mvn -B -P tests -Dmaven.javadoc.skip=true install jacoco:report  --file pom.xml
      env:
        AWS_REGION: ${{ secrets.AWS_REGION }}

    - name: Upload results to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Publish JARs
      run: |
        #!/bin/bash

        set -eux

        if [[ "${GITHUB_REF}" == *"tags"* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            mvn org.codehaus.mojo:versions-maven-plugin:2.1:set -DnewVersion="${TAG}"
        fi

        mvn -B -DskipTests=true -P ci,docs deploy --file pom.xml

      env:
        GITHUB_USERNAME: ${{ secrets.CI_USERNAME }}
        GITHUB_PASSWORD: ${{ secrets.CI_PASSWORD }}
        MAVEN_USERNAME: ${{ secrets.CI_DEPLOY_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.CI_DEPLOY_PASSWORD }}
        MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        MAVEN_GPG_KEY_NAME: ${{ secrets.MAVEN_GPG_KEY_NAME }}
        CI_DEPLOY_USERNAME: ${{ secrets.CI_DEPLOY_USERNAME }}
        CI_DEPLOY_PASSWORD: ${{ secrets.CI_DEPLOY_PASSWORD }}
        AWS_REGION: ${{ secrets.AWS_REGION }}

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Publish Docs
      run: |
        #!/bin/bash

        set -eux

        # Install MkDocs and plugins
        pip install mkdocs mkdocs-git-committers-plugin-2 mkdocs-theme-bootstrap4 mkdocs-macros-plugin

        # Where the reference documentation for THIS build is published. Tag builds
        # go under refs/release/<tag>, branch builds under refs/snapshot/<branch>
        # (e.g. refs/snapshot/main, refs/snapshot/support/spring-boot-3). These accumulate
        # in gh-pages so every published SNAPSHOT/GA link keeps resolving.
        if [[ "${GITHUB_REF}" == *"tags"* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            export BUILD_TYPE=release/"${TAG}"
            mvn org.codehaus.mojo:versions-maven-plugin:2.1:set -DnewVersion="${TAG}"
        else
            export BUILD_TYPE=snapshot/"${GITHUB_REF#refs/heads/}"
        fi

        # Version calculation for the docs landing-page table. All four values are
        # computed on every build (main, support/spring-boot-3 or a tag) so the regenerated
        # index always shows a consistent 3.x/4.x matrix regardless of the trigger.
        #
        # SNAPSHOT versions are read from each line's branch pom.xml; GA versions
        # from the highest release tag of the matching major line. Branches other
        # than the checked-out one aren't local refs (tag builds are detached), so
        # fetch them explicitly and read the pom via FETCH_HEAD. -N (non-recursive)
        # evaluates only the aggregator pom, whose child modules aren't present in
        # /tmp, avoiding a reactor-construction error leaking into the captured value.

        # 4.x SNAPSHOT: version declared in main's pom.xml
        git fetch --depth=1 origin main
        git show FETCH_HEAD:pom.xml > /tmp/main-pom.xml
        export SPRING_CONTENT_4X_SNAPSHOT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -N -f /tmp/main-pom.xml)

        # 3.x SNAPSHOT: version declared in the support/spring-boot-3 branch pom.xml
        git fetch --depth=1 origin support/spring-boot-3
        git show FETCH_HEAD:pom.xml > /tmp/support-spring-boot-3-pom.xml
        export SPRING_CONTENT_3X_SNAPSHOT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -N -f /tmp/support-spring-boot-3-pom.xml)

        # GA versions: highest release tag of each major line. fetch-depth:0 in the
        # checkout step already made every tag available. Leave the env var unset
        # when no matching tag exists yet (e.g. 4.x before its first release) so
        # mkdocs falls back to its configured default instead of an empty link.
        GA_3X=$(git tag --sort=-v:refname | grep -E '^3\.' | head -n1 || true)
        GA_4X=$(git tag --sort=-v:refname | grep -E '^4\.' | head -n1 || true)
        if [ -n "${GA_3X}" ]; then export SPRING_CONTENT_3X_GA_VERSION="${GA_3X}"; fi
        if [ -n "${GA_4X}" ]; then export SPRING_CONTENT_4X_GA_VERSION="${GA_4X}"; fi

        # Build reference documentation (AS IS)
        mvn -B -U -P docs generate-resources -DskipTests=true -Dmaven.javadoc.skip=true

        # Clone and build main docs
        git clone https://github.com/intesys/spring-content-docs.git /tmp/spring-content-docs
        pushd /tmp/spring-content-docs
            mkdocs build --clean --site-dir ../generated-site
        popd

        # Replace snippets in generated HTML
        python3 /tmp/spring-content-docs/scripts/replace_snippets.py /tmp/generated-site

        git config --global user.email "${CI_EMAIL}"
        git config --global user.name "${CI_USERNAME}"

        set +x
        mkdir -p ~/.ssh
        echo "${CI_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/id_rsa
        chmod 700 ~/.ssh/id_rsa
        eval $(ssh-agent -s)
        ssh-add ~/.ssh/id_rsa
        set -x

        mkdir -p /tmp/spring-content-gh-pages
        git clone --branch gh-pages git@github.com:intesys/spring-content.git /tmp/spring-content-gh-pages

        # Replace main documentation in gh-pages
        # Keep the refs directory
        # and replace the mkdocs
        
        # First, copy mkdocs built site to the root of gh-pages
        cp -R /tmp/generated-site/* /tmp/spring-content-gh-pages/
        
        # Then, replace/add the reference documentation (AS IS)
        mkdir -p /tmp/spring-content-gh-pages/refs/
        cp -R target/generated-docs/refs/* /tmp/spring-content-gh-pages/refs/

        # Push to gh-pages purely as persistent storage so historical refs/
        # accumulate across releases (Pages Source is now "GitHub Actions", so
        # this push no longer triggers the flaky implicit branch deployment).
        pushd /tmp/spring-content-gh-pages
            git add .
            git commit -m "Publishing documentation for ${GITHUB_REF}"
            git push origin gh-pages
        popd

        # Assemble a clean copy for the Pages artifact (drop .git) and disable
        # Jekyll processing — the mkdocs/asciidoc output is already static HTML.
        rsync -a --exclude='.git' /tmp/spring-content-gh-pages/ /tmp/site-public/
        touch /tmp/site-public/.nojekyll
      env:
        CI_USERNAME: ${{ secrets.CI_USERNAME }}
        CI_EMAIL: ${{ secrets.CI_EMAIL }}
        CI_PRIVATE_KEY: ${{ secrets.CI_PRIVATE_KEY }}

    - name: Configure Pages
      uses: actions/configure-pages@v5

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: /tmp/site-public

  deploy-docs:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Serialize deployments so overlapping runs don't fight over the rollout.
    concurrency:
      group: "pages"
      cancel-in-progress: false
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      with:
        timeout: 600000
        error_count: 15
