name: Main Build

on:
  push:
    branches: [ main ]
    tags:
    - '*'
    paths-ignore:
    - '.github/**'
    - '*.md'
  workflow_dispatch:
jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0
    - name: Set up JDK 17
      uses: actions/setup-java@v1
      with:
        java-version: 17
        server-id: central
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD
        gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
        gpg-passphrase: MAVEN_GPG_PASSPHRASE

    - name: Build and Test
      run: |
        mvn -B -P tests -Dmaven.javadoc.skip=true install jacoco:report  --file pom.xml
      env:
        AWS_REGION: ${{ secrets.AWS_REGION }}

    - name: Upload results to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Publish JARs
      run: |
        #!/bin/bash

        set -eux

        if [[ "${GITHUB_REF}" == *"tags"* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            mvn org.codehaus.mojo:versions-maven-plugin:2.1:set -DnewVersion="${TAG}"
        fi

        mvn -B -DskipTests=true -P ci,docs deploy --file pom.xml

      env:
        GITHUB_USERNAME: ${{ secrets.CI_USERNAME }}
        GITHUB_PASSWORD: ${{ secrets.CI_PASSWORD }}
        MAVEN_USERNAME: ${{ secrets.CI_DEPLOY_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.CI_DEPLOY_PASSWORD }}
        MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        MAVEN_GPG_KEY_NAME: ${{ secrets.MAVEN_GPG_KEY_NAME }}
        CI_DEPLOY_USERNAME: ${{ secrets.CI_DEPLOY_USERNAME }}
        CI_DEPLOY_PASSWORD: ${{ secrets.CI_DEPLOY_PASSWORD }}
        AWS_REGION: ${{ secrets.AWS_REGION }}

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Publish Docs
      run: |
        #!/bin/bash

        set -eux

        # Install MkDocs and plugins
        pip install mkdocs mkdocs-git-committers-plugin-2 mkdocs-theme-bootstrap4 mkdocs-macros-plugin

        # Version calculation
        POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "3.0.17")

        if [[ "${GITHUB_REF}" == *"tags"* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            export BUILD_TYPE=release/"${TAG}"
            mvn org.codehaus.mojo:versions-maven-plugin:2.1:set -DnewVersion="${TAG}"
            
            export SPRING_CONTENT_GA_VERSION="${TAG}"
            # Simple version increment for snapshot: e.g., 3.1.0 -> 3.1.1-SNAPSHOT
            # This is a bit naive but follows "tag + 1 -SNAPSHOT"
            if [[ $TAG =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                MAJOR=${BASH_REMATCH[1]}
                MINOR=${BASH_REMATCH[2]}
                PATCH=${BASH_REMATCH[3]}
                export SPRING_CONTENT_SNAPSHOT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"
            else
                export SPRING_CONTENT_SNAPSHOT_VERSION="${TAG}-SNAPSHOT"
            fi
        else
            export BUILD_TYPE=snapshot/"${GITHUB_REF#refs/heads/}"
            export SPRING_CONTENT_GA_VERSION="${LATEST_TAG}"
            export SPRING_CONTENT_SNAPSHOT_VERSION="${POM_VERSION}"
        fi

        # Build reference documentation (AS IS)
        mvn -B -U -P docs generate-resources -DskipTests=true -Dmaven.javadoc.skip=true

        # Clone and build main docs
        git clone https://github.com/intesys/spring-content-docs.git /tmp/spring-content-docs
        pushd /tmp/spring-content-docs
            mkdocs build --clean --site-dir ../generated-site
        popd

        # Replace snippets in generated HTML
        python3 scripts/replace_snippets.py /tmp/generated-site

        git config --global user.email "${CI_EMAIL}"
        git config --global user.name "${CI_USERNAME}"

        set +x
        mkdir -p ~/.ssh
        echo "${CI_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/id_rsa
        chmod 700 ~/.ssh/id_rsa
        eval $(ssh-agent -s)
        ssh-add ~/.ssh/id_rsa
        set -x

        mkdir -p /tmp/spring-content-gh-pages
        git clone --branch gh-pages git@github.com:intesys/spring-content.git /tmp/spring-content-gh-pages

        # Replace main documentation in gh-pages
        # Keep the refs directory
        # and replace the mkdocs
        
        # First, copy mkdocs built site to the root of gh-pages
        cp -R /tmp/generated-site/* /tmp/spring-content-gh-pages/
        
        # Then, replace/add the reference documentation (AS IS)
        mkdir -p /tmp/spring-content-gh-pages/refs/
        cp -R target/generated-docs/refs/* /tmp/spring-content-gh-pages/refs/

        pushd /tmp/spring-content-gh-pages
            git add .
            git commit -m "Publishing documentation for ${GITHUB_REF}"
            git push origin gh-pages
        popd
      env:
        CI_USERNAME: ${{ secrets.CI_USERNAME }}
        CI_EMAIL: ${{ secrets.CI_EMAIL }}
        CI_PRIVATE_KEY: ${{ secrets.CI_PRIVATE_KEY }}
