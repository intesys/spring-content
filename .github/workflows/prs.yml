name: PR Validation

on:
  pull_request:
    branches: [ main ]
  pull_request_target:
    types: [opened, closed, synchronize]
  issue_comment:
    types: [created]

# explicitly configure permissions, in case your GITHUB_TOKEN workflow permissions are set to read-only in repository settings
permissions:
  actions: write
  contents: write # this can be 'read' if the signatures are in remote repository
  pull-requests: write
  statuses: write

jobs:

  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # the below token should have repo scope and must be manually added by you in the repository's secret
          # This token is required only if you have configured to store the signatures in a remote repository/organization
          # PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/${{ github.repository }}/blob/main/CLA.md' # e.g. a CLA or a DCO document
          # branch should not be protected
          branch: 'main'
          allowlist: dependabot[bot],luca86r,marcobelligoli,RuudGianesini,springcontent-support-intesys

          # the followings are the optional inputs - If the optional inputs are not given, then default values will be taken
          #remote-organization-name: enter the remote organization name where the signatures should be stored (Default is storing the signatures in the same repository)
          #remote-repository-name: enter the  remote repository name where the signatures should be stored (Default is storing the signatures in the same repository)
          create-file-commit-message: 'Creating file for storing CLA Signatures'
          signed-commit-message: '$contributorName has signed the CLA in $owner/$repo#$pullRequestNo'
          #custom-notsigned-prcomment: 'pull request comment with Introductory message to ask new contributors to sign'
          #custom-pr-sign-comment: 'The signature to be committed in order to sign the CLA'
          #custom-allsigned-prcomment: 'pull request comment when all contributors has signed, defaults to **CLA Assistant Lite bot** All Contributors have signed the CLA.'
          #lock-pullrequest-aftermerge: false - if you don't want this bot to automatically lock the pull request after merging (default - true)
          #use-dco-flag: true - If you are using DCO instead of CLA

  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      spring_content_version: ${{ steps.build.outputs.spring_content_version }}
    steps:
    - uses: actions/checkout@v2
      with:
        path: spring-content
    - name: Set up JDK 21
      uses: actions/setup-java@v1
      with:
        java-version: 21
        server-id: central
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD
        gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
        gpg-passphrase: MAVEN_GPG_PASSPHRASE

    - name: Build and Test
      id: build
      run: |
        pushd spring-content
          AWS_REGION=us-west-1 mvn -B -P tests -Dmaven.javadoc.skip=true install --file pom.xml
          project_version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "spring_content_version=${project_version}" >> $GITHUB_OUTPUT
        popd

    - name: Save Maven Cache
      id: cache-maven-save
      uses: actions/cache/save@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-maven-${{ github.run_id }}

  validate-with-gettingstarteds:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
    - name: Set up JDK 21
      uses: actions/setup-java@v1
      with:
        java-version: 21
        server-id: central
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD
        gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
        gpg-passphrase: MAVEN_GPG_PASSPHRASE    
    - name: Restore Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-maven-${{ github.run_id }}
    - uses: actions/checkout@v2
      with:
        repository: intesys/spring-content-gettingstarted
        path: spring-content-gettingstarted
    
    - name: Validate against Getting Started Guides
      run: |
        pushd spring-content-gettingstarted
          SPRING_CONTENT_VERSION=${{ needs.build.outputs.spring_content_version }} AWS_REGION=us-west-1 mvn -B clean install
        popd        
